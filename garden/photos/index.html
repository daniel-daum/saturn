    <style>
        /* ===== photos-page-only layout ===== */
        /* wider body than the rest of the site, just for this page */
        body.photos-page {
            max-width: min(100rem, 94vw);
        }

        /* masonry-style wall via CSS multi-column layout: broad cross-browser
           support (unlike the still-experimental CSS grid-lanes/masonry specs),
           and lets each full-size image keep its own aspect ratio uncropped */
        .photo-wall {
            columns: 4 18rem;
            column-gap: 0.85rem;
        }

        .photo-tile {
            position: relative;
            display: block;
            break-inside: avoid;
            margin: 0 0 0.85rem;
            border-radius: 2px;
            overflow: hidden;
        }

        .photo-tile img {
            margin: 0;
        }

        /* the image itself is the link into the lightbox */
        .photo-link {
            display: block;
            border-bottom: none;
        }

        .photo-link:hover,
        .photo-link:focus-visible {
            background: none;
        }

        .photo-caption {
            position: absolute;
            inset: auto 0 0 0;
            margin: 0;
            padding: 1.75rem 0.85rem 0.75rem;
            background: linear-gradient(to top,
                    rgba(10, 14, 11, 0.92) 0%,
                    rgba(10, 14, 11, 0.5) 60%,
                    transparent 100%);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            color: var(--text-headings);
            font-size: 0.8rem;
            line-height: 1.4;
            opacity: 0;
            transform: translateY(6px);
            transition:
                opacity 200ms ease,
                transform 200ms ease;
            pointer-events: none;
        }

        .photo-tile:hover .photo-caption,
        .photo-tile:focus-within .photo-caption {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 900px) {
            .photo-wall {
                columns: 2 14rem;
            }
        }

        @media (max-width: 480px) {
            body.photos-page {
                max-width: 100%;
            }

            .photo-wall {
                columns: 1;
            }
        }

        /* ===== lightbox (pure CSS, no JS) ===== */
        /* each lightbox is a fixed overlay toggled on/off via :target,
           navigated entirely through anchor links (#view-n) */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
        }

        .lightbox:target {
            display: block;
        }

        .lightbox-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(10, 14, 11, 0.94);
            border: none;
        }

        .lightbox-backdrop:hover,
        .lightbox-backdrop:focus-visible {
            background: rgba(10, 14, 11, 0.94);
        }

        .lightbox-content {
            position: relative;
            z-index: 1;
            margin: 6vh auto 0;
            max-width: 92vw;
            max-height: 88vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        .lightbox-content>* {
            pointer-events: auto;
        }

        .lightbox-content img {
            max-width: 92vw;
            max-height: 76vh;
            width: auto;
            height: auto;
            margin: 0;
        }

        .lightbox-content figcaption {
            color: var(--text-headings);
            font-size: 0.85rem;
            margin-top: 0.85rem;
        }

        .lightbox-close,
        .lightbox-nav {
            position: fixed;
            color: var(--text-headings);
            border-bottom: none;
            text-decoration: none;
            line-height: 1;
        }

        .lightbox-close:hover,
        .lightbox-nav:hover,
        .lightbox-close:focus-visible,
        .lightbox-nav:focus-visible {
            color: var(--accent);
            background: none;
        }

        .lightbox-close {
            top: 1.25rem;
            right: 1.5rem;
            font-size: 1.4rem;
            padding: 0.4rem 0.6rem;
        }

        .lightbox-nav {
            top: 50%;
            transform: translateY(-50%);
            font-size: 2.25rem;
            padding: 0.5rem 0.85rem;
        }

        .lightbox-prev {
            left: 0.5rem;
        }

        .lightbox-next {
            right: 0.5rem;
        }

        @media (max-width: 600px) {

            .lightbox-nav {
                font-size: 1.75rem;
                padding: 0.4rem 0.6rem;
            }

            .lightbox-close {
                top: 0.75rem;
                right: 1rem;
            }
        }
    </style>
