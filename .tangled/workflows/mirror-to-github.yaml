# .tangled/workflows/mirror-to-github.yml

when:
  - event: ["push", "manual"]
    branch: ["main"]

engine: "nixery"

clone:
  depth: 0

dependencies:
  nixpkgs:
    - git

steps:
  - name: "Mirror to GitHub"
    command: |
      git remote add github https://x-access-token:${GITHUB_PAT}@github.com/${GITHUB_USERNAME}/${GITHUB_REPO_NAME}.git
      git push github refs/heads/main:refs/heads/main --force
    environment:
      GITHUB_USERNAME: "daniel-daum"
      GITHUB_REPO_NAME: "saturn"
